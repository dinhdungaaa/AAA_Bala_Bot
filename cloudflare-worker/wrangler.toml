name = "balabot-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# ─────────────────────────────────────────────────────────
# IMPORTANT: Change ORIGIN_SERVER to your actual server URL
# where the Node.js Express app is running.
#
# Examples:
#   - VPS:      https://123.45.67.89:3000
#   - Render:   https://balabot.onrender.com
#   - Railway:  https://balabot-production.up.railway.app
# ─────────────────────────────────────────────────────────

[vars]
ORIGIN_SERVER = "https://balabot-server.onrender.com"

# ─────────────────────────────────────────────────────────
# After deploying:  wrangler deploy
#
# Then go to Cloudflare Dashboard:
#   → Websites → antiantiai.xyz → Workers Routes
#   → Add Route: antiantiai.xyz/balabot*
#   → Select Worker: balabot-proxy
# ─────────────────────────────────────────────────────────
