services:
  - type: web
    name: balabot-server
    runtime: node
    repo: https://github.com/antiantiai/AAA_Bala_Bot
    buildCommand: npm install && VITE_BASE_PATH=/balabot/ npm run build
    startCommand: node dist/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /balabot
      - key: GEMINI_API_KEY
        sync: false
    plan: free
    healthCheckPath: /api/bots
