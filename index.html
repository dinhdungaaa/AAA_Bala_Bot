    <script>
      // Prevent "set on proxy: trap returned falsish" errors from TronLink or other extension injections
      (function() {
        try {
          var proxyVal = {};
          Object.defineProperty(window, 'tronlinkParams', {
            get: function() { return proxyVal; },
            set: function(newValue) {
              try {
                proxyVal = newValue;
              } catch (_) {}
              return true; // Ensure the setter always returns true to satisfy any proxy expectations
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            window.tronlinkParams = {};
          } catch (_) {}
        }

        // 1. Intercept global error events via standard listener
        window.addEventListener('error', function(event) {
          if (event && event.message && (
            event.message.indexOf('tronlinkParams') !== -1 ||
            event.message.indexOf('trap returned falsish') !== -1
          )) {
            event.preventDefault();
            event.stopImmediatePropagation && event.stopImmediatePropagation();
            event.stopPropagation && event.stopPropagation();
          }
        }, true);

        // 2. Intercept via window.onerror to ensure strict browser suppression
        var oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = String(message || '');
          if (
            msg.indexOf('tronlinkParams') !== -1 ||
            msg.indexOf('trap returned falsish') !== -1
          ) {
            return true; // Prevents the browser from displaying the error
          }
          if (oldOnError) {
            return oldOnError.apply(this, arguments);
          }
          return false;
        };

        // 3. Intercept via unhandledrejection
        window.addEventListener('unhandledrejection', function(event) {
          if (event && event.reason) {
            var reasonStr = String(event.reason.message || event.reason);
            if (
              reasonStr.indexOf('tronlinkParams') !== -1 ||
              reasonStr.indexOf('trap returned falsish') !== -1
            ) {
              event.preventDefault();
              event.stopImmediatePropagation && event.stopImmediatePropagation();
            }
          }
        }, true);
      })();
